# RFS Station Manager - OpenAPI Specification

openapi: 3.0.3
info:
  title: RFS Station Manager API
  description: |
    REST API for the RFS Station Manager - a real-time digital sign-in system for Rural Fire Service stations.
    
    This API provides endpoints for:
    - Member management
    - Activity tracking
    - Check-in/check-out operations
    - Event management
    - Truck checks
    - Achievements
    
    Real-time updates are also available via Socket.io WebSocket connections.
  version: 1.0.0
  contact:
    name: RFS Station Manager Support
    url: https://github.com/richardthorek/Station-Manager
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://bungrfsstation.azurewebsites.net
    description: Production server

tags:
  - name: Health
    description: Health check endpoints
  - name: Members
    description: Member management operations
  - name: Activities
    description: Activity management operations
  - name: Check-ins
    description: Check-in/check-out operations
  - name: Events
    description: Event management operations
  - name: Truck Checks
    description: Vehicle inspection operations
  - name: Achievements
    description: Member achievement operations
  - name: Organizations
    description: SaaS tenant management — signup, invites, multi-org membership (full detail in docs/registers/api_register.json)
  - name: Facilities
    description: Public emergency-services facility lookup (Digital Atlas of Australia) used by the signup facility-claim step
  - name: Platform Admin
    description: Platform-operator administration (PLATFORM_ADMIN_USERNAMES allowlist) — facility claim-conflict review
  - name: Billing
    description: Stripe Checkout/Portal/webhook — plan subscriptions and the standalone Fire Santa Run add-on (full detail in docs/registers/api_register.json → endpoints.billing)
  - name: Wiki
    description: In-app wiki (help drawer, public /wiki page, platform-admin help tab) — reads docs/wiki/{user-guide,platform-admin} at runtime (full detail in docs/registers/api_register.json → endpoints.wiki)

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the server is running and database is accessible
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, error]
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                    enum: [mongodb, in-memory]
                  environment:
                    type: string
                    enum: [development, production]
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/members:
    get:
      tags:
        - Members
      summary: Get all members
      description: Retrieve all registered members, sorted by activity level (check-ins in last 6 months) then alphabetically
      operationId: getMembers
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Members
      summary: Create new member
      description: Register a new member with auto-generated UUID and QR code
      operationId: createMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  example: John Smith
      responses:
        '201':
          description: Member created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/members/{id}:
    get:
      tags:
        - Members
      summary: Get member by ID
      description: Retrieve a specific member by their UUID
      operationId: getMemberById
      parameters:
        - name: id
          in: path
          required: true
          description: Member UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    put:
      tags:
        - Members
      summary: Update member
      description: Update member information
      operationId: updateMember
      parameters:
        - name: id
          in: path
          required: true
          description: Member UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                rank:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Member updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/members/qr/{qrCode}:
    get:
      tags:
        - Members
      summary: Get member by QR code
      description: Retrieve a member by their unique QR code
      operationId: getMemberByQRCode
      parameters:
        - name: qrCode
          in: path
          required: true
          description: Unique QR code string
          schema:
            type: string
      responses:
        '200':
          description: Member details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/members/{id}/history:
    get:
      tags:
        - Members
      summary: Get member check-in history
      description: Retrieve all historical check-ins for a member
      operationId: getMemberHistory
      parameters:
        - name: id
          in: path
          required: true
          description: Member UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member check-in history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CheckIn'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/activities:
    get:
      tags:
        - Activities
      summary: Get all activities
      description: Retrieve all activities (default and custom), sorted with defaults first
      operationId: getActivities
      responses:
        '200':
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Activities
      summary: Create custom activity
      description: Create a new custom activity
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  example: Equipment Check
                createdBy:
                  type: string
                  format: uuid
                  nullable: true
                  description: Member ID who created the activity
      responses:
        '201':
          description: Activity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/activities/active:
    get:
      tags:
        - Activities
      summary: Get active activity
      description: Retrieve the currently active activity for the station
      operationId: getActiveActivity
      responses:
        '200':
          description: Active activity details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveActivity'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Activities
      summary: Set active activity
      description: Change the active activity for the station
      operationId: setActiveActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - activityId
              properties:
                activityId:
                  type: string
                  format: uuid
                setBy:
                  type: string
                  format: uuid
                  nullable: true
                  description: Member ID who set the activity
      responses:
        '200':
          description: Active activity updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveActivity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/checkins/active:
    get:
      tags:
        - Check-ins
      summary: Get active check-ins
      description: Retrieve all currently active check-ins with member and activity details
      operationId: getActiveCheckIns
      responses:
        '200':
          description: List of active check-ins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CheckInWithDetails'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/checkins:
    post:
      tags:
        - Check-ins
      summary: Check in or undo check-in
      description: |
        Check in a member or undo their existing check-in (toggle behavior).
        If member is not checked in, creates new check-in.
        If member is already checked in, deactivates the check-in.
      operationId: toggleCheckIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - memberId
              properties:
                memberId:
                  type: string
                  format: uuid
                activityId:
                  type: string
                  format: uuid
                  nullable: true
                  description: If not provided, uses active activity
                method:
                  type: string
                  enum: [kiosk, mobile, qr]
                  default: mobile
                location:
                  type: string
                  nullable: true
                isOffsite:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Check-in undone
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum: [undone]
                  checkIn:
                    $ref: '#/components/schemas/CheckIn'
        '201':
          description: Member checked in
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum: [checked-in]
                  checkIn:
                    $ref: '#/components/schemas/CheckIn'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events:
    get:
      tags:
        - Events
      summary: Get all events
      description: Retrieve all events (active and historical), sorted by start time descending
      operationId: getEvents
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      tags:
        - Events
      summary: Create new event
      description: Create a new event instance
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  minLength: 1
                  example: Structure Fire - Main Street
                type:
                  type: string
                  enum: [incident, training, meeting, maintenance, other]
                location:
                  type: string
                  nullable: true
                description:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events/active:
    get:
      tags:
        - Events
      summary: Get active events
      description: Retrieve only currently active events
      operationId: getActiveEvents
      responses:
        '200':
          description: List of active events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events/{id}:
    get:
      tags:
        - Events
      summary: Get event with participants
      description: Retrieve event details including all participants
      operationId: getEventWithParticipants
      parameters:
        - name: id
          in: path
          required: true
          description: Event UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event details with participants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventWithParticipants'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events/{id}/end:
    put:
      tags:
        - Events
      summary: End event
      description: Mark an event as ended
      operationId: endEvent
      parameters:
        - name: id
          in: path
          required: true
          description: Event UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event ended successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events/{id}/participants:
    post:
      tags:
        - Events
      summary: Add participant to event
      description: Add a member as a participant in an event
      operationId: addEventParticipant
      parameters:
        - name: id
          in: path
          required: true
          description: Event UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - memberId
              properties:
                memberId:
                  type: string
                  format: uuid
                role:
                  type: string
                  nullable: true
                  example: Crew Leader
      responses:
        '201':
          description: Participant added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventParticipant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events/{eventId}/visitors:
    post:
      tags:
        - Events
      summary: Sign in an ephemeral visitor (AC-2)
      description: >-
        Add a walk-up visitor to an event by typed name. Unlike
        addEventParticipant, the visitor is never persisted as a Member (no
        history, no member-cap impact, no tap-to-repeat tile) and there is no
        toggle — every call adds a new EventParticipant row with
        isVisitor=true and a synthetic memberId.
      operationId: addEventVisitor
      parameters:
        - name: eventId
          in: path
          required: true
          description: Event UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: Jane Visitor
                method:
                  type: string
                  enum: [kiosk, mobile, qr, manual]
      responses:
        '201':
          description: Visitor added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventParticipant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/events/{id}/participants/{participantId}:
    delete:
      tags:
        - Events
      summary: Remove participant from event
      description: Check out a participant from an event
      operationId: removeEventParticipant
      parameters:
        - name: id
          in: path
          required: true
          description: Event UUID
          schema:
            type: string
            format: uuid
        - name: participantId
          in: path
          required: true
          description: Participant UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Participant removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventParticipant'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/achievements/member/{memberId}:
    get:
      tags:
        - Achievements
      summary: Get member achievements
      description: Retrieve all achievements for a specific member
      operationId: getMemberAchievements
      parameters:
        - name: memberId
          in: path
          required: true
          description: Member UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Achievement'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/achievements/recent:
    get:
      tags:
        - Achievements
      summary: Get recent achievements
      description: Retrieve recently unlocked achievements across all members
      operationId: getRecentAchievements
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of achievements to return
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Recent achievements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Achievement'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/signup:
    post:
      tags:
        - Organizations
      summary: Self-service sign-up with facility claim
      description: >
        Creates a Community-plan Organization and its owner account. Requires `email` and a
        `facility` selection — either `{facilityKey}` (first-come-first-served claim of a Digital
        Atlas facility) or `{custom: {name, serviceType, ...}}` (an unlisted unit, no review needed).
        Full request/response schema: docs/registers/api_register.json → auth["POST /api/auth/signup"].
      operationId: signup
      responses:
        '201':
          description: Account + organization created
        '400':
          description: Invalid input, unknown facilityKey, or missing custom facility details
        '409':
          description: Username taken, or code=FACILITY_ALREADY_CLAIMED (a ClaimConflict is recorded)

  /api/auth/switch-org:
    post:
      tags:
        - Organizations
      summary: Switch active organization (multi-org membership)
      description: >
        Reissues the JWT scoped to a different organization the caller is an active member of.
        Full schema: docs/registers/api_register.json → auth["POST /api/auth/switch-org"].
      operationId: switchOrg
      security:
        - bearerAuth: []
      responses:
        '200':
          description: New token + organization
        '403':
          description: Not a member of the target organization

  /api/auth/session:
    get:
      tags:
        - Organizations
      summary: Suite Phase 2 SSO bootstrap (cross-subdomain single sign-on)
      description: >
        Reads the sk_session httpOnly cookie (set on login/signup, scoped to COOKIE_DOMAIN e.g.
        .stationkit.com.au) and, if valid, returns the same identity/organization/entitlements
        payload as GET /api/auth/me plus a freshly-issued bearer token. A sibling StationKit app
        (Fire Santa Run, Fire Break Calculator) calls this once on load with credentials: 'include'
        to silently resume an existing Station Manager sign-in — the cookie itself never
        authorises a mutation, only this bootstrap read. Full schema:
        docs/registers/api_register.json → auth["GET /api/auth/session"].
      operationId: getSession
      responses:
        '200':
          description: '{ id, username, role, organizationId, organization, entitlements, memberships, token }'
        '401':
          description: No sk_session cookie, or it is invalid/expired (cleared server-side)
        '404':
          description: User not found

  /api/billing/santa-addon/checkout:
    post:
      tags:
        - Billing
      summary: Standalone Fire Santa Run add-on checkout (Community orgs)
      description: >
        Creates a Stripe Checkout session (mode: subscription) for the Fire Santa Run add-on —
        A$10/year (unlimited use) or A$15 for a one-off month — for Community orgs whose plan
        doesn't already grant santaRunEnabled (Basic/AI Pro get it bundled). Owner-only. Full
        schema: docs/registers/api_register.json → endpoints.billing["POST /api/billing/santa-addon/checkout"].
      operationId: createSantaAddonCheckout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: '{ checkoutUrl }'
        '400':
          description: Invalid billingInterval, price not configured, or the org's plan already includes Fire Santa Run
        '403':
          description: Caller is not the org owner
        '503':
          description: Santa add-on not configured (Stripe price/secret env vars missing)

  /api/organizations/current:
    get:
      tags:
        - Organizations
      summary: The caller's organization plus the plan catalog
      operationId: getCurrentOrganization
      security:
        - bearerAuth: []
      responses:
        '200':
          description: '{ organization, plans }'
        '404':
          description: Organization not found
    put:
      tags:
        - Organizations
      summary: Update name/billingEmail/planCode/moduleToggles/agencyName/agencyLogoUrl (owner only)
      description: >
        D1 (2026-07-17): the only functional plan-upgrade path while Stripe billing is
        unconfigured, so a genuine plan change with no live Stripe subscription also
        starts/ends a 14-day trial directly. Full schema:
        docs/registers/api_register.json → endpoints.organizations.
      operationId: updateCurrentOrganization
      security:
        - bearerAuth: []
      responses:
        '200':
          description: '{ organization }'
        '400':
          description: Invalid planCode
        '403':
          description: Caller is not the org owner

  /api/organizations/current/invites:
    post:
      tags:
        - Organizations
      summary: Create a multi-use org invite link
      description: Full schema in docs/registers/api_register.json → endpoints.organizations.
      operationId: createOrgInvite
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Invite created
    get:
      tags:
        - Organizations
      summary: List org invite links
      operationId: listOrgInvites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Invite list

  /api/organizations/current/members:
    get:
      tags:
        - Organizations
      summary: List org members (multi-org memberships)
      operationId: listOrgMembers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Member list

  /api/organizations/current/export:
    get:
      tags:
        - Organizations
      summary: Download a full data export (owner only)
      description: >
        JSON bundle of the org's stations, members, event/attendance history,
        truck-check history (vehicles + check runs with results), and device
        records — for privacy/retention requests and a brigade's own
        record-keeping. Event history is capped at 5000 events per station;
        truck-check runs at 5000 across all stations combined (both
        newest-first).
        Full schema: docs/registers/api_register.json → endpoints.organizations.
      operationId: exportOrganizationData
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data export (downloadable attachment)
        '403':
          description: Caller is not the org owner

  /api/org-invites/{token}:
    get:
      tags:
        - Organizations
      summary: Public invite preview
      operationId: getInviteInfo
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Organization name + role
        '404':
          description: Unknown token
        '410':
          description: Expired or revoked

  /api/facilities/lookup:
    get:
      tags:
        - Facilities
      summary: Search the Digital Atlas emergency-services facility dataset
      description: >
        Requires `q` (min 2 chars) and/or `lat`+`lon`. Optional `serviceType`/`state` filters.
        Full schema: docs/registers/api_register.json → endpoints.facilities.
      operationId: lookupFacilities
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: serviceType
          in: query
          schema:
            type: string
            enum: [rural-fire, metro-fire, ses, ambulance, police, other]
      responses:
        '200':
          description: Matching facilities, each annotated with `claimed`
        '503':
          description: Facility dataset snapshot not loaded

  /api/platform/claim-conflicts:
    get:
      tags:
        - Platform Admin
      summary: List facility claim conflicts
      operationId: listClaimConflicts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conflict list
        '403':
          description: Not a platform admin

  /api/platform/organizations:
    get:
      tags:
        - Platform Admin
      summary: List every organization (aggregate counts only, never row-level tenant data)
      operationId: listPlatformOrganizations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: |
            { organizations }. Full schema: docs/registers/api_register.json → endpoints.platform.
        '403':
          description: Not a platform admin

  /api/platform/organizations/{id}:
    get:
      tags:
        - Platform Admin
      summary: Organization detail + memberships (account info, not tenant content)
      operationId: getPlatformOrganization
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: '{ organization, members, plans }'
        '403':
          description: Not a platform admin
        '404':
          description: Organization not found
    patch:
      tags:
        - Platform Admin
      summary: Update plan/status/entitlements, or clear a facility claim
      operationId: updatePlatformOrganization
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: '{ organization }'
        '400':
          description: Invalid planCode or status
        '403':
          description: Not a platform admin
        '404':
          description: Organization not found
    delete:
      tags:
        - Platform Admin
      summary: Soft-deactivate (default), or hard-delete with ?hard=true + confirm
      operationId: deletePlatformOrganization
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: hard
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: "{ organization } for soft delete, { success: true } for hard delete"
        '400':
          description: Hard delete requested without a matching confirm string
        '403':
          description: Not a platform admin
        '404':
          description: Organization not found

  /api/platform/organizations/{id}/members:
    post:
      tags:
        - Platform Admin
      summary: Create an account and membership it into this organization
      operationId: addPlatformOrgMember
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: '{ user }'
        '403':
          description: Not a platform admin
        '409':
          description: Username already taken

  /api/platform/organizations/{id}/members/{userId}:
    put:
      tags:
        - Platform Admin
      summary: Change a member's role in this organization
      operationId: changePlatformOrgMemberRole
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: '{ membership }'
        '403':
          description: Not a platform admin
        '409':
          description: Would leave the organisation with no owner
    delete:
      tags:
        - Platform Admin
      summary: Remove a member from this organization
      operationId: removePlatformOrgMember
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: '{ success: true }'
        '403':
          description: Not a platform admin
        '409':
          description: Would leave the organisation with no owner

  /api/platform/accounts/{userId}:
    delete:
      tags:
        - Platform Admin
      summary: Soft-deactivate (default), or hard-delete with ?hard=true + confirm
      operationId: deletePlatformAccount
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: hard
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: '{ success: true }'
        '400':
          description: Hard delete requested without a matching confirm string
        '403':
          description: Not a platform admin
        '404':
          description: Account not found

  /api/platform/stations/orphaned:
    get:
      tags:
        - Platform Admin
      summary: List active stations with no owning organization (Q35 backfill)
      description: >
        Stations created before Q33 tagged organizationId on creation have
        none, so their members/vehicles don't count toward any org's plan
        limits until backfilled. Returns name/brigade/hierarchy plus
        member/vehicle counts so the operator can identify the real-world
        brigade.
      operationId: getOrphanedStations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: '{ stations: PlatformOrphanedStation[] }'
        '403':
          description: Not a platform admin

  /api/platform/stations/{id}/organization:
    patch:
      tags:
        - Platform Admin
      summary: Assign (or reassign) a station's owning organization
      operationId: assignStationOrganization
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: '{ station }'
        '400':
          description: Missing organizationId, or target is a system station
        '403':
          description: Not a platform admin
        '404':
          description: Station or target organization not found

  /api/platform/audit-log:
    get:
      tags:
        - Platform Admin
      summary: Platform-admin audit log, newest first
      operationId: getPlatformAuditLog
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: '{ logs }'
        '403':
          description: Not a platform admin

  /api/wiki/user-guide:
    get:
      tags:
        - Wiki
      summary: User-guide table of contents (public)
      operationId: getWikiUserGuideManifest
      responses:
        '200':
          description: |
            { sections: [{ heading, pages: [{ slug, title, description }] }] }. Full schema: docs/registers/api_register.json → endpoints.wiki.

  /api/wiki/user-guide/pages/{slug}:
    get:
      tags:
        - Wiki
      summary: One user-guide page's markdown (public)
      operationId: getWikiUserGuidePage
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: '{ slug, title, markdown }'
        '404':
          description: Unknown slug

  /api/wiki/user-guide/images/{filename}:
    get:
      tags:
        - Wiki
      summary: A user-guide image (public, cross-origin readable)
      operationId: getWikiUserGuideImage
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Image file
        '404':
          description: Unknown filename

  /api/wiki/user-guide/search:
    post:
      tags:
        - Wiki
      summary: Grounded AI search over the user-guide corpus (public, rate-limited)
      operationId: searchWikiUserGuide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: |
            { answer, covered, sources }. Full schema: docs/registers/api_register.json → endpoints.wiki.
        '400':
          description: Missing or overlong query
        '429':
          description: AI rate limit exceeded
        '502':
          description: Model returned no parseable structured answer
        '503':
          description: AI is not configured on this server

  /api/wiki/platform-admin:
    get:
      tags:
        - Wiki
        - Platform Admin
      summary: Platform-admin doc table of contents
      operationId: getWikiPlatformAdminManifest
      security:
        - bearerAuth: []
      responses:
        '200':
          description: '{ sections: [...] }'
        '403':
          description: Not a platform admin

  /api/wiki/platform-admin/pages/{slug}:
    get:
      tags:
        - Wiki
        - Platform Admin
      summary: One platform-admin doc page's markdown
      operationId: getWikiPlatformAdminPage
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: '{ slug, title, markdown }'
        '403':
          description: Not a platform admin
        '404':
          description: Unknown slug

  /api/wiki/platform-admin/images/{filename}:
    get:
      tags:
        - Wiki
        - Platform Admin
      summary: A platform-admin doc image
      operationId: getWikiPlatformAdminImage
      security:
        - bearerAuth: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Image file
        '403':
          description: Not a platform admin
        '404':
          description: Unknown filename

  /api/wiki/platform-admin/search:
    post:
      tags:
        - Wiki
        - Platform Admin
      summary: Grounded AI search over the platform-admin doc corpus
      operationId: searchWikiPlatformAdmin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: '{ answer, covered, sources }'
        '400':
          description: Missing or overlong query
        '403':
          description: Not a platform admin
        '429':
          description: AI rate limit exceeded
        '502':
          description: Model returned no parseable structured answer
        '503':
          description: AI is not configured on this server

components:
  schemas:
    Member:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        qrCode:
          type: string
        rank:
          type: string
          nullable: true
        memberNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - qrCode
        - createdAt
        - updatedAt

    Activity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        isCustom:
          type: boolean
        createdBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - isCustom
        - createdAt

    ActiveActivity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        activityId:
          type: string
          format: uuid
        setAt:
          type: string
          format: date-time
        setBy:
          type: string
          format: uuid
          nullable: true
        activity:
          $ref: '#/components/schemas/Activity'
      required:
        - id
        - activityId
        - setAt
        - activity

    CheckIn:
      type: object
      properties:
        id:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        activityId:
          type: string
          format: uuid
        checkInTime:
          type: string
          format: date-time
        checkOutTime:
          type: string
          format: date-time
          nullable: true
        checkInMethod:
          type: string
          enum: [kiosk, mobile, qr]
        location:
          type: string
          nullable: true
        isOffsite:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - memberId
        - activityId
        - checkInTime
        - checkInMethod
        - isOffsite
        - isActive
        - createdAt
        - updatedAt

    CheckInWithDetails:
      allOf:
        - $ref: '#/components/schemas/CheckIn'
        - type: object
          properties:
            memberName:
              type: string
            activityName:
              type: string
          required:
            - memberName
            - activityName

    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [incident, training, meeting, maintenance, other]
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
          nullable: true
        location:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - startTime
        - isActive
        - createdAt
        - updatedAt

    EventParticipant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        checkInTime:
          type: string
          format: date-time
        checkOutTime:
          type: string
          format: date-time
          nullable: true
        role:
          type: string
          nullable: true
        isActive:
          type: boolean
        isVisitor:
          type: boolean
          description: >-
            AC-2: true for ephemeral visitors (typed name, not a persisted
            Member).
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - eventId
        - memberId
        - checkInTime
        - isActive
        - createdAt
        - updatedAt

    EventWithParticipants:
      allOf:
        - $ref: '#/components/schemas/Event'
        - type: object
          properties:
            participants:
              type: array
              items:
                $ref: '#/components/schemas/EventParticipant'
          required:
            - participants

    Achievement:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [sign_in, event, truck_check]
        requirement:
          type: integer
        icon:
          type: string
        isUnlocked:
          type: boolean
        unlockedAt:
          type: string
          format: date-time
          nullable: true
        progress:
          type: integer
      required:
        - id
        - name
        - description
        - category
        - requirement
        - icon
        - isUnlocked
        - progress

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    # Future: JWT Bearer token authentication for admin functions
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

# No security required currently (by design for kiosk access)
# Future versions may require authentication for admin operations
security: []
