# ===============================================================================
# RFS Station Manager - Comprehensive CI/CD Pipeline
# ===============================================================================
# 
# Purpose:
#   Automated quality assurance, testing, and deployment pipeline with strict
#   quality gates to ensure no broken code reaches production.
#
# Pipeline Stages (sequential on a single runner):
#   1. One-time setup (checkout, Node, dependency install with caching)
#   2. Quality gates (lint + type checks)
#   3. Tests with coverage reporting
#   4. Build artifacts
#   5. Deploy (main branch only)
#   Note: Post-deployment smoke tests temporarily disabled (see comments below)
#
# Quality Gates:
#   - All linting must pass (zero errors, zero warnings)
#   - Type checking must pass (TypeScript strict mode)
#   - All tests must pass (backend Jest + frontend Vitest + AAR Studio node:test)
#   - Build must succeed
#   - Deployment only occurs if all above gates pass
#   - Post-deployment tests validate live application
#
# Deployment Strategy:
#   OPTIMIZED FOR RELIABILITY:
#
#   Artifact Packaging:
#     - Ships pre-built backend/dist (compiled TypeScript)
#     - Ships pre-built frontend/dist (optimized static assets)
#     - Ships aar-studio/ (no-build static bundle, mounted at /aar by the backend)
#     - Ships backend/node_modules (pre-installed production dependencies)
#     - Ships package.json and package-lock.json (for reference)
#     - Does NOT ship source code (.ts files)
#
#   Azure App Service Deployment (Windows/IIS):
#     - SCM_DO_BUILD_DURING_DEPLOYMENT=false (all dependencies pre-installed)
#     - No post-deploy npm install (dependencies included in package)
#     - Faster deployment (no dependency installation or native module compilation)
#     - Ensures consistent environment with exact versions
#     - Avoids native module compilation issues (bcrypt, etc.)
#     - Retry logic handles transient 409 Conflict errors
#
#   Why Include node_modules:
#     - Eliminates native module compilation issues (bcrypt requires node-gyp)
#     - Faster Azure startup (no npm install = no 230s container timeout)
#     - Deterministic deployments (exact same dependencies as CI build)
#     - Works on Windows without C++ build tools
#     - Larger package size (~100MB) but much more reliable
#
#   Deployment Reliability:
#     - Automatic retry on 409 Conflict errors (common with Oryx builds)
#     - 60-second wait between retries to allow Azure to complete previous operations
#     - Handles transient deployment conflicts gracefully
#
#   Benefits:
#     - Faster CI/CD pipeline (single runner, no redundant setup)
#     - Faster Azure container startup (no npm install)
#     - No native module compilation failures
#     - Deterministic builds (exact versions from package-lock.json)
#     - Resilient to transient Azure deployment conflicts
#     - Fail-fast: subsequent steps stop on first failure
#
# Post-Deployment Testing Strategy:
#   RE-ENABLED (2026-06-06)
#
#   Fix: postDeploymentTests.ts is compiled to dist/scripts/postDeploymentTests.js
#   by the standard `tsc` build (it's included in src/**/* and not excluded).
#   The npm script now runs `node dist/scripts/postDeploymentTests.js` instead of
#   ts-node, so no dev dependencies are required in the deployed environment.
#
#   Two-phase approach:
#     Phase 1: Stabilization (up to 20 minutes)
#       - Waits 30 seconds for Azure App Service restart to begin
#       - Polls health endpoint every 10 seconds
#       - Validates site is responding AND correct version is deployed
#       - Exits immediately when both conditions met (efficient!)
#       - Maximum: 1200s (20 minutes) from start of polling
#       - Typical: 3-4 minutes (exits early when ready)
#
#     Phase 2: Functional Tests (minimal retries)
#       - Runs only after stabilization confirms site is ready
#       - Each test gets 2 quick retries (5s between) for transient issues
#       - Tests fail fast since site is known to be up
#       - Expected completion: 30-60 seconds for all 7 tests
#
#     Total Maximum Time: 30s wait + 20 min stabilization + 2 min tests = 22.5 minutes
#     Typical Time: 30s wait + 3 min stabilization + 1 min tests = 4.5 minutes
#
#     This is efficient because:
#       - Minimal initial wait (30s) before starting health checks
#       - Stabilization happens once, upfront
#       - No duplicate health checks across tests
#       - Functional tests run fast with minimal retries
#       - Early exit when site is ready (no wasted time)
#       - Increased timeout (20 min) accommodates Azure's npm install + startup
#
#     Environment Variables:
#       - Uses TABLE_STORAGE_TABLE_SUFFIX=Test for isolated test data
#       - Leverages existing OIDC authentication (no secrets needed)
#       - Validates database connectivity and API responsiveness
#
# Optimizations:
#   - Single-runner pipeline to avoid redundant dependency installs
#   - Dependency caching (npm)
#   - Concurrency control (cancels outdated PR runs)
#   - Path filtering: Skip pipeline for documentation-only changes
#     (docs/**, *.md files) to reduce deployment frequency
#   - Optimized artifact packaging (aar-studio/ bundled for /aar App Service mount)
#   - Azure post-deploy builds (SCM_DO_BUILD_DURING_DEPLOYMENT=true)
#
# Future Optimizations:
#   - Conditional execution based on file changes (future enhancement)
#
# Failure Handling:
#   - Detailed error logs in workflow output
#   - Automatic issue creation on failure (see create-issue-on-failure.yml)
#
# Documentation:
#   - See docs/wiki/developer/ci-pipeline.md for detailed pipeline documentation
#   - See docs/MASTER_PLAN.md for strategic planning
#
# Maintenance:
#   - Review and update periodically
#   - Monitor GitHub Actions minutes usage
#   - Optimize caching strategies as project grows
#
# ===============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/*.md'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.x'
  NPM_CACHE_KEY: 'npm-cache-v1'

jobs:
  pipeline:
    name: CI/CD Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Type check backend
        run: |
          cd backend
          npx tsc --noEmit

      - name: Run backend tests with coverage
        run: |
          cd backend
          npm run test:coverage

      - name: Append backend coverage numbers to summary
        if: always()
        run: |
          if [ -f backend/coverage/coverage-summary.json ]; then
            node -e "const s=require('./backend/coverage/coverage-summary.json').total; const fmt=n=>n.toFixed(1)+'%'; console.log(['## Backend Coverage','',`Statements: ${fmt(s.statements.pct)}`,`Branches: ${fmt(s.branches.pct)}`,`Functions: ${fmt(s.functions.pct)}`,`Lines: ${fmt(s.lines.pct)}`].join('\n'))" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "Coverage summary not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload backend coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 30

      - name: Display backend coverage summary
        if: always()
        run: |
          echo "## Backend Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f backend/coverage/lcov.info ]; then
            echo "Coverage report generated successfully ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run ESLint (frontend)
        run: |
          cd frontend
          npm run lint

      - name: Type check frontend
        run: |
          cd frontend
          npx tsc -b --noEmit

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          npm run test:coverage

      - name: Append frontend coverage numbers to summary
        if: always()
        run: |
          if [ -f frontend/coverage/coverage-summary.json ]; then
            node -e "const s=require('./frontend/coverage/coverage-summary.json').total; const fmt=n=>n.toFixed(1)+'%'; console.log(['## Frontend Coverage','',`Statements: ${fmt(s.statements.pct)}`,`Branches: ${fmt(s.branches.pct)}`,`Functions: ${fmt(s.functions.pct)}`,`Lines: ${fmt(s.lines.pct)}`].join('\n'))" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "Coverage summary not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload frontend coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

      - name: Display frontend coverage summary
        if: always()
        run: |
          echo "## Frontend Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f frontend/coverage/lcov.info ]; then
            echo "Coverage report generated successfully ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run AAR Studio unit tests
        run: |
          cd aar-studio
          npm test

      - name: Build application
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_COMMIT_SHORT: ${{ github.sha }}
          BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          # Suite sibling-app URLs baked into the frontend build (empty falls
          # back to the defaults in frontend/src/config/suiteApps.ts).
          VITE_FIREBREAK_URL: ${{ vars.VITE_FIREBREAK_URL }}
          VITE_SANTA_RUN_URL: ${{ vars.VITE_SANTA_RUN_URL }}
        run: |
          # Set short commit SHA (first 7 characters)
          export GIT_COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          
          # Export for backend (will be in compiled code)
          export GIT_COMMIT_SHA="${{ github.sha }}"
          # Use commit timestamp if available, otherwise use current time
          export BUILD_TIMESTAMP="${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}"
          if [ -z "$BUILD_TIMESTAMP" ]; then
            export BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          
          # Build both frontend and backend
          npm run build
          
          # Create .env file for backend runtime
          echo "GIT_COMMIT_SHA=${{ github.sha }}" > backend/dist/.env
          echo "GIT_COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)" >> backend/dist/.env
          echo "BUILD_TIMESTAMP=${BUILD_TIMESTAMP}" >> backend/dist/.env

      - name: Analyze bundle size
        run: |
          echo "## Bundle Size Analysis 📦" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get main bundle size (gzipped)
          MAIN_BUNDLE=$(ls -lh frontend/dist/assets/index-*.js 2>/dev/null | awk '{print $5}' | head -1)
          MAIN_BUNDLE_GZ=$(du -h frontend/dist/assets/index-*.js.gz 2>/dev/null | awk '{print $1}' | head -1)
          
          echo "### Main Bundle" >> $GITHUB_STEP_SUMMARY
          echo "- Uncompressed: ${MAIN_BUNDLE:-N/A}" >> $GITHUB_STEP_SUMMARY
          echo "- Gzipped: ${MAIN_BUNDLE_GZ:-N/A}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # List all vendor chunks
          echo "### Vendor Chunks" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh frontend/dist/assets/vendor-*.js 2>/dev/null | awk '{print $9, "-", $5}' | sed 's|frontend/dist/assets/||' || echo "No vendor chunks found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Total dist size
          TOTAL_SIZE=$(du -sh frontend/dist | awk '{print $1}')
          echo "**Total dist size**: ${TOTAL_SIZE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if bundle analyzer stats exist
          if [ -f frontend/dist/stats.html ]; then
            echo "✅ Bundle analyzer report generated at \`frontend/dist/stats.html\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Bundle analyzer report not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload bundle stats
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bundle-stats
          path: |
            frontend/dist/stats.html
            frontend/dist/stats.html
          retention-days: 30

      - name: Install backend production dependencies
        run: |
          cd backend
          npm ci --production --ignore-scripts
          echo "✅ Production dependencies installed"
          ls -lh node_modules | head -20

      - name: Create deployment package
        run: |
          mkdir -p deploy/backend
          mkdir -p deploy/frontend
          cp package.json deploy/
          cp -r backend/dist deploy/backend/
          cp -r backend/node_modules deploy/backend/
          cp backend/package.json deploy/backend/
          cp backend/package-lock.json deploy/backend/
          cp -r frontend/dist deploy/frontend/
          cp -r aar-studio deploy/aar-studio
          cp startup.sh deploy/ 2>/dev/null || true
          cp web.config deploy/ 2>/dev/null || true

          echo "📦 Package contents:"
          du -sh deploy/backend/node_modules
          du -sh deploy/backend/dist
          du -sh deploy/frontend/dist
          du -sh deploy/aar-studio
          
          cd deploy && zip -r ../release.zip .
          cd .. && ls -lh release.zip

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-app
          path: release.zip
          retention-days: 7

      - name: Login to Azure
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ff11f578-2330-478f-b3f1-f97fe351ea94
          subscription-id: 67fb0ac0-a5bf-4906-bf1f-5756416dc98b

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bungrfs-linux'
          slot-name: 'Production'
          package: release.zip
        continue-on-error: true
      
      - name: Check deployment result
        id: check-deploy
        if: steps.deploy-to-webapp.outcome == 'failure'
        run: |
          echo "⚠️  Initial deployment failed"
          echo "Common causes: 409 Conflict (Oryx build), Azure updates, concurrent deployments"
          echo "Will retry once after a delay..."
          echo "deployment_failed=true" >> $GITHUB_OUTPUT
      
      - name: Wait before retry
        if: steps.check-deploy.outputs.deployment_failed == 'true'
        run: |
          echo "🔄 Waiting 60 seconds to allow Azure operations to complete..."
          sleep 60
          echo "🚀 Retrying deployment..."
      
      - name: Deploy to Azure Web App (Retry)
        if: steps.check-deploy.outputs.deployment_failed == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bungrfs-linux'
          slot-name: 'Production'
          package: release.zip

      - name: Set Azure App Service environment variables
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          # Set version environment variables in Azure App Service
          # These override any .env file values to ensure correct version reporting
          
          # Determine build timestamp with fallback (handle empty strings and null)
          BUILD_TS="${{ github.event.head_commit.timestamp }}"
          if [ -z "$BUILD_TS" ] || [ "$BUILD_TS" = "null" ]; then
            BUILD_TS="${{ github.event.repository.updated_at }}"
          fi
          if [ -z "$BUILD_TS" ] || [ "$BUILD_TS" = "null" ]; then
            BUILD_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          
          # WEBSITE_RUN_FROM_PACKAGE=1 makes Azure mount the deployment zip
          # read-only instead of extracting backend/node_modules (tens of
          # thousands of files) onto the /home Azure Files share — that
          # extraction was taking ~8 min per deploy. Set here (idempotent) so it
          # takes effect from the NEXT deploy onward, by which point the
          # writable-log-path fix (logger.ts → /home/LogFiles) is already live.
          az webapp config appsettings set \
            --resource-group bungrfsstation_group \
            --name bungrfs-linux \
            --settings \
              GIT_COMMIT_SHA="${{ github.sha }}" \
              GIT_COMMIT_SHORT="$(echo "${{ github.sha }}" | cut -c1-7)" \
              BUILD_TIMESTAMP="$BUILD_TS" \
              WEBSITE_RUN_FROM_PACKAGE="1" \
            --output none
          echo "✅ Environment variables set in Azure App Service"
          echo "   - GIT_COMMIT_SHA: ${{ github.sha }}"
          echo "   - GIT_COMMIT_SHORT: $(echo "${{ github.sha }}" | cut -c1-7)"
          echo "   - BUILD_TIMESTAMP: $BUILD_TS"

          # Restart the app to immediately pick up new environment variables
          echo ""
          echo "🔄 Restarting Azure App Service to apply new environment variables..."
          az webapp restart \
            --resource-group bungrfsstation_group \
            --name bungrfs-linux \
            --output none
          echo "✅ App restart initiated"
          
          # Wait for Azure to complete the restart before running smoke tests
          # Azure App Service restarts typically take 2-3 minutes
          echo ""
          echo "⏳ Waiting 30 seconds for Azure App Service restart to begin..."
          echo "   Stabilization polling will start immediately after"
          sleep 30
          echo "✅ Wait complete, proceeding to stabilization checks"

      - name: Deployment summary
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **App Name**: bungrfs-linux" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Run post-deployment smoke tests
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          APP_URL: https://bungrfs-linux.azurewebsites.net
          TABLE_STORAGE_TABLE_SUFFIX: Test
          STABILIZATION_TIMEOUT: 1200
          STABILIZATION_INTERVAL: 10
          FUNCTIONAL_TEST_TIMEOUT: 120
          FUNCTIONAL_TEST_RETRIES: 2
          REQUEST_TIMEOUT: 10000
          GITHUB_SHA: ${{ github.sha }}
        run: |
          cd backend
          echo "🧪 Running two-phase post-deployment tests..."
          echo ""
          echo "Phase 1: Stabilization (up to 20 minutes)"
          echo "  - Polls until site is up AND correct version"
          echo "  - Exits immediately when ready (efficient!)"
          echo ""
          echo "Phase 2: Functional tests (minimal retries)"
          echo "  - Runs fast with 2 retries per test"
          echo "  - Expected: 30-60 seconds"
          echo ""
          echo "Target: $APP_URL"
          echo "Commit: ${{ github.sha }}"
          echo ""
          npm run test:post-deploy

      - name: Post-deployment test summary
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo "## 🧪 Post-Deployment Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Target URL**: https://bungrfs-linux.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Environment**: TABLE_STORAGE_TABLE_SUFFIX=Test" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
